<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard ONPE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/fondo.css">
  <link rel="stylesheet" href="/btn-vistas.css">
    <link rel="stylesheet" href="/contenido.css">
</head>

<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">
      <h3>ONPE</h3>
    </div>

    <div class="sidebar-menu">

  <a href="/HTML/inicio.html" class="menu-btn">
    <i class="fa-solid fa-house"></i>
    Inicio
  </a>

  <a href="/HTML/postulaciones.html" class="menu-btn active">
    <i class="fa-solid fa-users"></i>
    Postulaciones
  </a>

  <a href="/HTML/evaluaciones.html" class="menu-btn">
    <i class="fa-solid fa-clipboard-check"></i>
    Evaluaciones
  </a>

  <a href="/HTML/documentos.html" class="menu-btn">
    <i class="fa-solid fa-file-lines"></i>
    Documentos
  </a>

  <a href="/HTML/reportes.html" class="menu-btn">
    <i class="fa-solid fa-chart-column"></i>
    Reportes
  </a>

  <a href="/HTML/usuarios.html" class="menu-btn">
    <i class="fa-solid fa-user-group"></i>
    Usuarios
  </a>

  <a href="/HTML/config.html" class="menu-btn">
    <i class="fa-solid fa-gear"></i>
    Configuración
  </a>

</div>

    <div class="logout">
      <i class="fa-solid fa-right-from-bracket"></i>
      Cerrar sesión
    </div>

  </aside>

    <div class="main">

    <!-- HEADER -->
    <header class="header navbar navbar-expand-lg bg-white shadow-sm px-4">

      <div>
        <h4 class="fw-bold m-0">Registro de Postulaciones</h4>
        <small class="text-secondary">
          Complete la información del postulante.
        </small>
      </div>

      <div class="ms-auto d-flex align-items-center gap-3">

        <!-- PERFIL -->
        <div class="dropdown">

          <button class="btn btn-light border dropdown-toggle d-flex align-items-center gap-2"
            data-bs-toggle="dropdown">

            <div class="avatar"></div>

            Administrador

          </button>

          <ul class="dropdown-menu dropdown-menu-end">

            <li>
              <a class="dropdown-item" href="#">
                Perfil
              </a>
            </li>

            <li>
              <a class="dropdown-item" href="#">
                Configuración
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
              <a class="dropdown-item text-danger" href="#">
                Cerrar sesión
              </a>
            </li>

          </ul>

        </div>

      </div>

    </header>

<div class="content">
    <div class="top-actions">

        <!-- VOLVER -->
        <a href="/HTML/postulaciones.html"
        class="btn btn-light shadow-sm back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Volver a vistas
        </a>

    </div>
<!-- CONTENIDO -->
<div class="dashboard-content">

  <!-- FORMULARIO -->
  <div class="card border-0 shadow-sm">

    <div class="card-body p-4">

      <form>

        <div class="row g-4">

          <!-- NOMBRES -->
          <div class="col-md-6">

            <label class="form-label fw-semibold">
              Nombres
            </label>

            <input type="text"
            class="form-control"
            placeholder="Ingrese nombres">

          </div>



          <!-- APELLIDOS -->
          <div class="col-md-6">

            <label class="form-label fw-semibold">
              Apellidos
            </label>

            <input type="text"
            class="form-control"
            placeholder="Ingrese apellidos">

          </div>



          <!-- DNI -->
          <div class="col-md-4">

            <label class="form-label fw-semibold">
              DNI
            </label>

            <input type="text"
            class="form-control"
            placeholder="00000000">

          </div>



          <!-- TELEFONO -->
          <div class="col-md-4">

            <label class="form-label fw-semibold">
              Teléfono
            </label>

            <input type="text"
            class="form-control"
            placeholder="999 999 999">

          </div>



          <!-- CORREO -->
          <div class="col-md-4">

            <label class="form-label fw-semibold">
              Correo
            </label>

            <input type="email"
            class="form-control"
            placeholder="correo@gmail.com">

          </div>



          <!-- CARGO -->
          <div class="col-md-6">

            <label class="form-label fw-semibold">
              Cargo Postulado
            </label>

            <select class="form-select">

              <option selected disabled>
                Seleccione un cargo
              </option>

              <option>
                Coordinador
              </option>

              <option>
                Supervisor
              </option>

              <option>
                Operador
              </option>

            </select>

          </div>



          <!-- MODALIDAD -->
          <div class="col-md-6">

            <label class="form-label fw-semibold">
              Modalidad
            </label>

            <select class="form-select">

              <option selected disabled>
                Seleccione modalidad
              </option>

              <option>
                Presencial
              </option>

              <option>
                Virtual
              </option>

            </select>

          </div>



          <!-- DIRECCION -->
          <div class="col-12">

            <label class="form-label fw-semibold">
              Dirección
            </label>

            <input type="text"
            class="form-control"
            placeholder="Ingrese dirección">

          </div>



          <!-- DOCUMENTOS -->
          <div class="col-12">

            <label class="form-label fw-semibold">
              Adjuntar CV
            </label>

            <input type="file"
            class="form-control">

          </div>



          <!-- OBSERVACIONES -->
          <div class="col-12">

            <label class="form-label fw-semibold">
              Observaciones
            </label>

            <textarea
            class="form-control"
            rows="4"
            placeholder="Ingrese observaciones"></textarea>

          </div>

        </div>



        <!-- BOTONES -->
        <div class="d-flex justify-content-end gap-3 mt-4">

          <button type="reset"
          class="btn btn-light border">

            <i class="fa-solid fa-rotate-left"></i>

            Limpiar

          </button>



          <button type="submit"
          class="btn btn-danger">

            <i class="fa-solid fa-floppy-disk"></i>

            Registrar

          </button>

        </div>

      </form>

    </div>

  </div>

</div>

    </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
